name: CI Smoke

on:
  pull_request:
  workflow_dispatch:

jobs:
  backend-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check protected intern paths
        shell: pwsh
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:BASE_SHA) -or $env:BASE_SHA -match '^0+$') {
            python scripts/check_protected_paths.py --base-ref HEAD~1 --head-ref HEAD
          } else {
            python scripts/check_protected_paths.py --base-ref $env:BASE_SHA --head-ref $env:GITHUB_SHA
          }

      - name: Install backend dependencies
        run: python -m pip install -r requirements/backend.txt

      - name: Validate contract schemas
        run: python scripts/validate_contracts.py

      - name: Check requirements hygiene
        run: python scripts/check_requirements_hygiene.py

      - name: Check architecture guardrails
        run: python scripts/check_architecture_guardrails.py

      - name: Django system check
        run: python manage.py check

      - name: Migration drift check
        run: python manage.py makemigrations --check --dry-run

      - name: Django root tests
        run: python manage.py test tests --noinput

      - name: Smoke tests
        run: python scripts/ci_smoke.py
